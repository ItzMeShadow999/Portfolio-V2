<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // VOID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
    <style>
        :root {
            --neon-purple: #a020f0;
            --dark-obsidian: #0a0a0a;
            --terminal-glow: #660099;
        }

        body {
            background-color: var(--dark-obsidian);
            color: #e0b0ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            cursor: crosshair;
        }

        .banner-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('banner.jpg') center/cover no-repeat;
            filter: brightness(0.4);
            z-index: -2;
            animation: glitch-shake 4s infinite;
        }

        @keyframes glitch-shake {
            0%, 95%, 100% { transform: translate(0); filter: brightness(0.4); }
            1% { transform: translate(-2px, 2px); filter: brightness(0.6); }
            97% { filter: brightness(0.7) contrast(1.2); }
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px) saturate(150%);
            border: 1px solid rgba(160, 32, 240, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(160, 32, 240, 0.2);
            transition: transform 0.3s ease;
        }

        #rain-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; pointer-events: none; display: none;
        }

        .pfp-container {
            clip-path: polygon(25% 0%, 100% 0%, 100% 75%, 75% 100%, 0% 100%, 0% 25%);
            box-shadow: 0 0 20px var(--neon-purple);
            border: 1px solid var(--neon-purple);
        }

        .glass-btn {
            background: rgba(160, 32, 240, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid var(--neon-purple);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: all 0.2s;
        }

        .nav-item:hover .tooltip { display: block; }
        .tooltip {
            display: none; position: absolute; background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--neon-purple); padding: 10px; font-size: 10px;
            width: 200px; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 50;
        }

        /* 80k Lines Simulation */
        #code-stream {
            position: fixed;
            right: 10px; top: 0;
            width: 350px; height: 100%;
            font-size: 8px; color: #660099;
            opacity: 0.12; overflow: hidden;
            pointer-events: none;
            white-space: pre;
            line-height: 1;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <canvas id="rain-canvas"></canvas>
    <div class="banner-bg"></div>
    <div id="code-stream"></div>

    <audio id="click-sound" src="Click.mp3"></audio>
    <audio id="boot-audio" src="opening.mp3"></audio>
    <audio id="main-player"></audio>

    <div class="absolute top-6 left-6 font-mono text-xs text-purple-400 opacity-70">
        <span id="terminal-boot"></span>
    </div>

    <div class="fixed bottom-6 right-6 w-80 p-4 liquid-glass z-50">
        <div class="flex items-center gap-4">
            <img id="album-art" src="thumb-1920-1092511.jpg" class="w-16 h-16 rounded-lg object-cover border border-purple-500/50">
            <div class="flex-1 overflow-hidden">
                <p id="song-name" class="text-xs font-bold truncate">I Really Want to Stay at Your House</p>
                <div class="flex gap-4 mt-2">
                    <button onclick="prevSong()" class="hover:text-white">«</button>
                    <button onclick="togglePlay()" id="play-btn" class="text-purple-400 hover:text-white">PLAY</button>
                    <button onclick="nextSong()" class="hover:text-white">»</button>
                </div>
            </div>
        </div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" class="w-full mt-3 accent-purple-600 bg-transparent h-1">
    </div>

    <div class="z-10 flex flex-col items-center main-ui">
        <div class="pfp-container w-64 h-64 mb-6 group relative">
            <img src="pfp.png" alt="Profile" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
            <div class="absolute inset-0 bg-purple-500 mix-blend-screen opacity-10 pointer-events-none"></div>
        </div>

        <nav class="flex gap-12 text-sm tracking-widest mb-10 relative">
            <div class="relative nav-item group cursor-help">
                <span class="hover:text-purple-400 transition">./PROJECTS</span>
                <div class="tooltip font-mono leading-tight">
                    • TERMINAL_COSMOS Engine <br>
                    • Sankardev Bidya Niketan Portal <br>
                    • Adomina Paneru Discord Bot <br>
                    • Floating Island Fortress
                </div>
            </div>
            <div class="relative nav-item group cursor-help">
                <span class="hover:text-purple-400 transition">./ABOUT</span>
                <div class="tooltip font-mono leading-tight">
                    [IDENT] PRITAM / SHADOW <br>
                    [ROLE] ASPIRING DEVELOPER <br>
                    [SKILLS] JS, THREE.JS, PYTHON <br>
                </div>
            </div>
        </nav>

        <button onclick="initiateExit()" class="glass-btn px-10 py-3 text-purple-300 font-bold tracking-tighter hover:text-white uppercase">
            Open Discord
        </button>
    </div>

    <script>
        const playlist = [
            { name: "I Really Want to Stay at Your House", file: "I really want to stay at your home.mp3", art: "thumb-1920-1092511.jpg" },
            { name: "Poster Boy", file: "poster boy.mp3", art: "Poster boy.png" },
            { name: "Places", file: "Places.mp3", art: "Places.png" },
            { name: "X-COOL! Loop!", file: "X-COOL! Loop!.mp3", art: "X-COOL! Loop!.png" }
        ];

        let songIndex = 0;
        const player = document.getElementById('main-player');
        const playBtn = document.getElementById('play-btn');

        function loadSong(index) {
            const song = playlist[index];
            player.src = song.file;
            document.getElementById('song-name').innerText = song.name;
            document.getElementById('album-art').src = song.art;
        }

        function togglePlay() {
            if (player.paused) { player.play(); playBtn.innerText = "PAUSE"; }
            else { player.pause(); playBtn.innerText = "PLAY"; }
        }

        function nextSong() { songIndex = (songIndex + 1) % playlist.length; loadSong(songIndex); player.play(); }
        function prevSong() { songIndex = (songIndex - 1 + playlist.length) % playlist.length; loadSong(songIndex); player.play(); }

        document.getElementById('volume-slider').addEventListener('input', (e) => { player.volume = e.target.value; });
        loadSong(songIndex);

        window.addEventListener('mousedown', () => { 
            const click = document.getElementById('click-sound');
            click.currentTime = 0;
            click.play();
        });

        // Expanded 80k Lines Simulation
        const stream = document.getElementById('code-stream');
        function generateCode() {
            let chunk = "";
            for(let i=0; i<60; i++) {
                chunk += `0x${Math.random().toString(16).substr(2, 8)} >> VOID_INJECT_${Math.floor(Math.random()*80000)} >> OK\n`;
            }
            stream.innerText = (stream.innerText + chunk).slice(-20000);
        }
        setInterval(generateCode, 80);

        new Typed('#terminal-boot', {
            strings: ['> AUTHENTICATING...', '> STATUS: VOID_ACTIVE', '> Life is peak if you know to live it. -SHADOW.'],
            typeSpeed: 30
        });

        // Matrix Rain
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        let drops = [];

        function initRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const columns = canvas.width / 15;
            for (let i = 0; i < columns; i++) drops[i] = 1;
        }

        function drawRain() {
            ctx.fillStyle = "rgba(10, 10, 10, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#a020f0";
            ctx.font = "15px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 15, drops[i] * 15);
                if (drops[i] * 15 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // FADE AND EXIT LOGIC
        function initiateExit() {
            const bootAudio = document.getElementById('boot-audio');
            
            // Fade out current music
            const fadeInterval = setInterval(() => {
                if (player.volume > 0.05) {
                    player.volume -= 0.05;
                } else {
                    player.pause();
                    clearInterval(fadeInterval);
                }
            }, 50);

            // Play opening.mp3
            bootAudio.play();

            // Start Animation
            canvas.style.display = 'block';
            initRain();
            setInterval(drawRain, 30);
            
            // Hide UI and Player
            document.querySelector('.main-ui').style.transition = "opacity 0.8s ease";
            document.querySelector('.main-ui').style.opacity = "0";
            document.querySelector('.liquid-glass').style.opacity = "0";

            setTimeout(() => { 
                window.location.href = "https://discord.com/users/1258270400425754699"; 
            }, 3000);
        }
    </script>
</body>
</html>
